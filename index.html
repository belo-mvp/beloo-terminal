<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BELOO MVP TERMINAL</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #000; overflow: hidden; display: flex; flex-direction: column; font-family: monospace; color: #0f0; }
        #matrix-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        #terminal { position: relative; z-index: 2; flex: 1; padding: 20px; font-size: 1.1rem; text-shadow: 0 0 5px #0f0; display: flex; flex-direction: column; justify-content: flex-end; }
        .output { overflow-y: auto; max-height: 80%; pointer-events: auto; scrollbar-width: none; -ms-overflow-style: none; }
        .output::-webkit-scrollbar { display: none; }
        .line { margin: 0; padding: 2px 0; }
        .line.user { color: #88ff88; font-weight: bold; }
        .line.system { color: #ff0000; font-weight: bold; text-shadow: 0 0 20px #ff0000, 0 0 40px #8b0000; font-size: 1.5rem; text-align: center;}
        .line.success { color: #ffff88; font-weight: bold;}
        .prompt-container { display: flex; align-items: center; pointer-events: auto; }
        .prompt { font-weight: bold; margin-right: 5px; color: #88ff88; }
        #input-command { background: none; border: none; color: #0f0; font-family: monospace; font-size: 1.1rem; width: 100%; outline: none; caret-color: #fff; }
    </style>
</head>
<body>

    <canvas id="matrix-canvas"></canvas>

    <div id="terminal">
        <div class="output" id="terminal-output">
            <p class="line system">WELCOME TO THE MVP_BELOO TERMINAL [SYSTEM: ONLINE]</p>
            <p class="line">Type 'help' to see available commands.</p>
        </div>
        <div class="prompt-container">
            <span class="prompt">[mvp_beloo@terminal ~]$</span>
            <input type="text" id="input-command" autofocus>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.onresize = resize; resize();
        
        const words = "BELOO MVP ";
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = [];
        for (let x = 0; x < columns; x++) drops[x] = 1;

        function draw() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'rgba(0, 255, 0, 0.5)';
            ctx.font = fontSize + 'px monospace';
            for (let i = 0; i < drops.length; i++) {
                const char = words.charAt(Math.floor(Math.random() * words.length));
                ctx.fillText(char, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(draw, 35);

        // Terminal logic
        const inputField = document.getElementById('input-command');
        const terminalOutput = document.getElementById('terminal-output');

        inputField.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                const command = inputField.value.trim().toLowerCase();
                inputField.value = '';
                
                printToTerminal(`[mvp_beloo@terminal ~]$ ${command}`, 'user');
                processCommand(command);
                terminalOutput.scrollTop = terminalOutput.scrollHeight;
            }
        });

        function printToTerminal(text, type = '') {
            const newLine = document.createElement('p');
            newLine.className = `line ${type}`;
            newLine.innerText = text;
            terminalOutput.appendChild(newLine);
        }

        const linkCommands = {
            'instagram': "https://www.instagram.com/i_eminki.01?igsh=cGNsc2tjbXliaXpl&utm_source=qr",
            'snapchat': "https://snapchat.com/t/FIuxhe8f",
            'tiktok': "https://www.tiktok.com/@1st.belo?_r=1&_t=ZS-960bVrYrDBH"
        };

        function processCommand(command) {
            if (command === 'help') {
                printToTerminal("Available commands:\n  help: Show this list\n  instagram: Link to Instagram\n  snapchat: Link to Snapchat\n  tiktok: Link to TikTok\n  underestimate: Power phrase\n  clear: Clear screen");
            } else if (linkCommands[command]) {
                printToTerminal(`Accessing ${command} link...`, 'success');
                setTimeout(() => { window.open(linkCommands[command], '_blank'); }, 500);
            } else if (command === 'underestimate') {
                printToTerminal("POWER OF BELOO", 'system');
                printToTerminal("Underestimate me. That'll be fun.", 'system');
            } else if (command === 'clear') {
                terminalOutput.innerHTML = '';
            } else {
                printToTerminal(`Command not found: ${command}`, 'system');
            }
        }
    </script>
</body>
</html>
