<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BELO-MVP | ELITE TERMINAL</title>
    <style>
        :root { --main-green: #00ff41; --glow: 0 0 10px #00ff41, 0 0 20px #00ff41; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #000; overflow: hidden; font-family: 'JetBrains Mono', monospace; color: var(--main-green); }
        #matrix-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; opacity: 0.15; }
        #terminal { position: relative; z-index: 2; height: 100vh; display: flex; flex-direction: column; padding: 30px; box-sizing: border-box; background: radial-gradient(circle, rgba(0,25,0,0.2) 0%, rgba(0,0,0,1) 100%); }
        .output { flex: 1; overflow-y: auto; scrollbar-width: none; mask-image: linear-gradient(to bottom, transparent 0%, black 15%); }
        .output::-webkit-scrollbar { display: none; }
        .line { margin-bottom: 8px; font-size: 1.1rem; line-height: 1.5; }
        .user-tag { color: #fff; font-weight: bold; text-shadow: var(--glow); }
        .underestimate-box { border: 2px solid #ff003c; color: #ff003c; padding: 15px; margin: 20px 0; font-size: 1.4rem; text-align: center; text-transform: uppercase; font-weight: 900; box-shadow: 0 0 20px rgba(255,0,60,0.5); animation: glitch 0.3s infinite alternate; }
        .input-area { display: flex; align-items: center; padding-top: 20px; border-top: 1px solid rgba(0,255,65,0.2); }
        #input-command { background: none; border: none; color: #fff; font-family: inherit; font-size: 1.2rem; width: 100%; outline: none; caret-color: var(--main-green); }
        @keyframes glitch { 0% { transform: skew(0.5deg); opacity: 0.8; } 100% { transform: skew(-0.5deg); opacity: 1; } }
        .header { font-size: 2rem; font-weight: 900; letter-spacing: 4px; text-shadow: var(--glow); margin-bottom: 25px; border-left: 5px solid var(--main-green); padding-left: 15px; }
    </style>
</head>
<body>
    <canvas id="matrix-canvas"></canvas>
    <div id="terminal">
        <div class="output" id="terminal-output">
            <div class="header">BELO-MVP://ULTIMATE_V4</div>
            <p class="line">> INITIALIZING ENCRYPTED PROTOCOLS...</p>
            <p class="line">> AUTHENTICATION SUCCESSFUL.</p>
            <p class="line">> TYPE 'HELP' TO START.</p>
        </div>
        <div class="input-area">
            <span class="user-tag">belo-mvp@terminal:~$</span>
            <input type="text" id="input-command" autofocus autocomplete="off">
        </div>
    </div>

    <script>
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const drops = Array(Math.floor(canvas.width/16)).fill(1);
        function draw() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#0f0'; ctx.font = '15px monospace';
            drops.forEach((y, i) => {
                ctx.fillText(Math.random() > 0.5 ? "1" : "0", i * 16, y * 16);
                if (y * 16 > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(draw, 33);

        const input = document.getElementById('input-command');
        const output = document.getElementById('terminal-output');
        const links = { 'instagram': "https://www.instagram.com/i_eminki.01", 'snapchat': "https://snapchat.com/t/FIuxhe8f", 'tiktok': "https://www.tiktok.com/@1st.belo" };

        document.addEventListener('click', () => input.focus());

        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const cmd = input.value.trim().toLowerCase();
                input.value = '';
                if (!cmd) return;

                print(`<span class="user-tag">belo-mvp@terminal:~$</span> ${cmd}`);

                if (cmd === 'help') {
                    print("> AVAILABLE: help, instagram, snapchat, tiktok, underestimate, clear");
                } else if (links[cmd]) {
                    print(`> CONNECTING TO ${cmd.toUpperCase()}...`);
                    setTimeout(() => window.open(links[cmd], '_blank'), 500);
                } else if (cmd === 'underestimate') {
                    print("Underestimate me. That'll be fun.", "underestimate-box");
                } else if (cmd === 'clear') {
                    output.innerHTML = '<div class="header">BELO-MVP://ULTIMATE_V4</div>';
                } else {
                    print(`> ERROR: '${cmd}' IS NOT A VALID COMMAND.`);
                }
                output.scrollTop = output.scrollHeight;
            }
        });

        function print(text, cls = '') {
            const d = document.createElement('div'); d.className = 'line ' + cls;
            d.innerHTML = text; output.appendChild(d);
        }
    </script>
</body>
</html>
