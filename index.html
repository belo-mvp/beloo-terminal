<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BELO | ULTIMATE SYSTEM</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=JetBrains+Mono:wght@700&display=swap');
        :root { --primary: #ff0000; --secondary: #00ff41; --bg: #000; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); overflow: hidden; font-family: 'JetBrains Mono', monospace; }
        #matrix { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; opacity: 0.25; }
        
        /* Scanner Line Effect */
        .scanner { position: absolute; top: -100%; left: 0; width: 100%; height: 50px; background: linear-gradient(to bottom, transparent, var(--primary), transparent); opacity: 0.5; z-index: 5; pointer-events: none; }
        .scanning { animation: scan-anim 1.5s linear; }
        @keyframes scan-anim { 0% { top: -100%; } 100% { top: 100%; } }

        #terminal { position: relative; z-index: 10; height: 100vh; display: flex; flex-direction: column; padding: 15px; box-sizing: border-box; }
        .power-header { text-align: center; margin-bottom: 5px; }
        .main-title { 
            font-family: 'Orbitron', sans-serif; font-size: 3.2rem; color: #fff; 
            text-shadow: 0 0 20px var(--primary); animation: glow 2s infinite alternate;
            letter-spacing: 10px; margin: 0;
        }
        @keyframes glow { from { text-shadow: 0 0 10px var(--primary); } to { text-shadow: 0 0 30px var(--primary), 0 0 10px #fff; } }

        .output { flex: 1; overflow-y: auto; scrollbar-width: none; color: var(--secondary); }
        .line { margin-bottom: 5px; font-size: 0.9rem; font-weight: bold; }
        .cmd-out { color: #fff; border-left: 4px solid var(--primary); padding-left: 10px; margin: 10px 0; background: rgba(255,0,0,0.15); box-shadow: 0 0 15px rgba(255,0,0,0.3); }
        
        .social-btn { display: inline-block; padding: 10px; margin: 5px 2px; color: #fff; text-decoration: none; border: 1.5px solid var(--secondary); font-size: 0.8rem; box-shadow: 0 0 10px var(--secondary); }
        
        .input-area { display: flex; align-items: center; background: rgba(10,10,10,0.95); border: 1.5px solid var(--primary); padding: 12px; box-shadow: 0 0 25px var(--primary); }
        .prompt { margin-right: 8px; color: var(--primary); font-weight: 900; font-size: 1.2rem; }
        #cmd-input { background: none; border: none; color: #fff; font-family: inherit; font-size: 1.1rem; width: 100%; outline: none; }
        
        .alert { animation: alert-flash 0.3s 2; }
        @keyframes alert-flash { 50% { background: rgba(255,0,0,0.5); } }
    </style>
</head>
<body onclick="initAudio()">
    <div class="scanner" id="scanner"></div>
    <canvas id="matrix"></canvas>
    <div id="terminal">
        <div class="power-header"><h1 class="main-title">BELO</h1></div>
        <div class="output" id="out"><p class="line">> KERNEL_LOADED: READY_TO_STRIKE</p></div>
        <div class="input-area"><span class="prompt">root#</span><input type="text" id="cmd-input" autofocus autocomplete="off"></div>
    </div>

    <script>
        const canvas = document.getElementById('matrix'); const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const text = "BELO 10 "; const fontSize = 16; const rows = Math.floor(canvas.height / fontSize);
        const xPositions = Array(rows).fill(0);
        function drawMatrix() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.1)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#ff0000"; ctx.font = "900 " + fontSize + "px monospace";
            xPositions.forEach((x, i) => {
                ctx.fillText(text.charAt(Math.floor(Math.random() * text.length)), x * fontSize, i * fontSize);
                if (x * fontSize > canvas.width && Math.random() > 0.98) xPositions[i] = 0;
                xPositions[i]++;
            });
        }
        setInterval(drawMatrix, 35);

        let audioCtx; function initAudio() { if(!audioCtx) audioCtx = new AudioContext(); }
        function playSound(f, d, g=0.1) {
            if(!audioCtx) return;
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.frequency.value = f; gain.gain.setValueAtTime(g, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + d);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + d);
        }

        const input = document.getElementById('cmd-input'); const out = document.getElementById('out');
        const scanner = document.getElementById('scanner');

        async function typeText(element, text) {
            for(let i=0; i<text.length; i++) {
                element.innerHTML += text.charAt(i);
                playSound(400, 0.05, 0.02);
                await sleep(30);
            }
        }

        async function runCommand(cmd) {
            scanner.classList.remove('scanning'); void scanner.offsetWidth; scanner.classList.add('scanning');
            const logLine = document.createElement('p'); logLine.className = 'line';
            logLine.innerHTML = `<span style="color:#fff;">$ ${cmd}</span>`;
            out.appendChild(logLine);

            if (cmd === 'help') { printLine("socials, bypass, inject, ddos, bio, clear"); }
            else if (cmd === 'socials') {
                printLine(`<a href="https://www.instagram.com/i_eminki.01" target="_blank" class="social-btn">INSTAGRAM</a> <a href="https://snapchat.com/t/FIuxhe8f" target="_blank" class="social-btn">SNAPCHAT</a>`, "cmd-out");
            }
            else if (cmd === 'bypass') { await sleep(500); printLine("SYSTEM_CRACKED: ACCESS_LEVEL_GOD", "cmd-out"); }
            else if (cmd === 'inject') { await sleep(500); printLine("SQL_PAYLOAD_DELIVERED. DATA_MINED.", "cmd-out"); }
            else if (cmd === 'ddos') { await sleep(500); printLine("PACKET_STORM_ACTIVE. HOST_DOWN.", "cmd-out"); }
            else if (cmd === 'bio') { printLine("Underestimate me. That’ll be fun.", "cmd-out"); }
            else if (cmd === 'clear') { out.innerHTML = ''; }
            else { 
                document.body.classList.add('alert'); setTimeout(()=>document.body.classList.remove('alert'), 600);
                playSound(100, 0.5, 0.3); printLine("ERR: SYSTEM_REJECTED_INPUT"); 
            }
            out.scrollTop = out.scrollHeight;
        }

        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') { playSound(40, 0.6, 0.5); runCommand(input.value.trim().toLowerCase()); input.value = ''; }
            else { playSound(250, 0.08, 0.1); }
        });

        function printLine(txt, cls = '') { 
            const p = document.createElement('p'); p.className = 'line ' + cls; 
            p.innerHTML = txt; out.appendChild(p); out.scrollTop = out.scrollHeight; 
        }
        function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
    </script>
</body>
</html>
