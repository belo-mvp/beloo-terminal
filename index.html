<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MVP BELO | THE ELITE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Space+Mono&display=swap');
        
        :root { --accent: #00ff41; --bg: #050505; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); overflow: hidden; font-family: 'Space Mono', monospace; color: #fff; }

        /* Cinematic Background */
        .bg-layer { position: absolute; width: 100%; height: 100%; background: radial-gradient(circle at 50% 50%, rgba(0, 255, 65, 0.05) 0%, transparent 80%); z-index: 1; }

        #terminal { position: relative; z-index: 10; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }

        /* Luxury Glass Box */
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(0, 255, 65, 0.1); padding: 60px; border-radius: 5px; box-shadow: 0 25px 50px rgba(0,0,0,0.5); text-align: center; max-width: 80%; animation: slideUp 1.2s ease-out; }

        .name-title { font-family: 'Cinzel', serif; font-size: 4.5rem; color: var(--accent); letter-spacing: 20px; margin: 0; text-shadow: 0 0 30px rgba(0, 255, 65, 0.3); }

        .divider { width: 50px; height: 2px; background: #fff; margin: 30px auto; opacity: 0.3; }

        .quote { font-size: 1.2rem; letter-spacing: 6px; color: #aaa; text-transform: uppercase; margin-bottom: 40px; }

        .social-links { display: flex; gap: 25px; justify-content: center; }
        .btn { text-decoration: none; color: #fff; font-size: 0.8rem; letter-spacing: 3px; border: 1px solid rgba(255,255,255,0.2); padding: 12px 25px; transition: 0.4s; }
        .btn:hover { background: var(--accent); color: #000; border-color: var(--accent); box-shadow: 0 0 20px var(--accent); transform: scale(1.05); }

        #time { position: absolute; bottom: 30px; font-size: 1rem; opacity: 0.4; letter-spacing: 4px; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(50px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="bg-layer"></div>
    <div id="terminal">
        <div class="glass-card">
            <h1 class="name-title">MVP BELO</h1>
            <div class="divider"></div>
            <p class="quote">Underestimate me. That’ll be fun.</p>
            
            <div class="social-links">
                <a href="https://www.instagram.com/i_eminki.01" target="_blank" class="btn">INSTAGRAM</a>
                <a href="https://snapchat.com/t/FIuxhe8f" target="_blank" class="btn">SNAPCHAT</a>
                <a href="https://www.tiktok.com/@1st.belo" target="_blank" class="btn">TIKTOK</a>
            </div>
        </div>
        <div id="time">00:00:00</div>
    </div>

    <script>
        function updateTime() {
            const now = new Date();
            document.getElementById('time').innerText = now.getHours().toString().padStart(2, '0') + ":" + 
                                                      now.getMinutes().toString().padStart(2, '0') + ":" + 
                                                      now.getSeconds().toString().padStart(2, '0');
        }
        setInterval(updateTime, 1000); updateTime();
    </script>
</body>
</html>
