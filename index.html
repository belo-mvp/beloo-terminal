<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BELO-MVP TERMINAL</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #000; overflow: hidden; display: flex; flex-direction: column; font-family: 'Courier New', Courier, monospace; color: #0f0; }
        #matrix-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; opacity: 0.3; pointer-events: none; }
        #terminal { position: relative; z-index: 2; flex: 1; padding: 25px; font-size: 1.1rem; display: flex; flex-direction: column; justify-content: flex-end; background: radial-gradient(circle, rgba(0,20,0,0.4) 0%, rgba(0,0,0,1) 100%); }
        .output { overflow-y: auto; max-height: 90%; text-shadow: 0 0 8px rgba(0, 255, 0, 0.8); }
        .line { margin: 0; padding: 3px 0; line-height: 1.4; }
        .line.user { color: #88ff88; font-weight: bold; }
        .line.system-msg { color: #ff3333; font-weight: bold; text-transform: uppercase; border-left: 3px solid #ff3333; padding-left: 10px; margin: 10px 0; }
        .prompt-container { display: flex; align-items: center; margin-top: 10px; border-top: 1px solid rgba(0, 255, 0, 0.2); padding-top: 10px; }
        #input-command { background: none; border: none; color: #0f0; font-family: inherit; font-size: 1.1rem; width: 100%; outline: none; caret-color: #0f0; }
        .glitch { animation: glitch 1s linear infinite; }
        @keyframes glitch { 2%, 64% { transform: translate(2px,0) skew(0deg); } 4%, 60% { transform: translate(-2px,0) skew(0deg); } 62% { transform: translate(0,0) skew(5deg); } }
    </style>
</head>
<body>
    <canvas id="matrix-canvas"></canvas>
    <div id="terminal">
        <div class="output" id="terminal-output">
            <p class="line glitch" style="font-size: 1.5rem; font-weight: bold;">[ SYSTEM READY: BELO-MVP ]</p>
            <p class="line">Type <span style="color: #fff;">'help'</span> to see available protocols.</p>
        </div>
        <div class="prompt-container">
            <span style="color:#88ff88; font-weight:bold; margin-right:8px;">belo-mvp@terminal:~$</span>
            <input type="text" id="input-command" autofocus autocomplete="off">
        </div>
    </div>

    <script>
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const matrixChars = "BELO-MVP-101010-SYSTEM-";
        const fontSize = 16;
        const drops = Array(Math.floor(canvas.width / fontSize)).fill(1);
        function drawMatrix() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#0f0'; ctx.font = fontSize + 'px monospace';
            drops.forEach((y, i) => {
                const char = matrixChars[Math.floor(Math.random() * matrixChars.length)];
                ctx.fillText(char, i * fontSize, y * fontSize);
                if (y * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(drawMatrix, 35);

        const inputField = document.getElementById('input-command');
        const output = document.getElementById('terminal-output');
        const links = {
            'instagram': "https://www.instagram.com/i_eminki.01",
            'snapchat': "https://snapchat.com/t/FIuxhe8f",
            'tiktok': "https://www.tiktok.com/@1st.belo"
        };

        document.addEventListener('click', () => inputField.focus());

        inputField.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const val = inputField.value.trim().toLowerCase();
                inputField.value = '';
                if (!val) return;

                print(`belo-mvp@terminal:~$ ${val}`, 'user');

                if (val === 'help') {
                    print("COMMANDS: help, instagram, snapchat, tiktok, underestimate, clear");
                } else if (links[val]) {
                    print(`> Establishing connection to ${val.toUpperCase()}...`);
                    setTimeout(() => window.open(links[val], '_blank'), 500);
                } else if (val === 'underestimate') {
                    print("Underestimate me. That'll be fun.", "system-msg");
                } else if (val === 'clear') {
                    output.innerHTML = '';
                } else {
                    print(`ERROR: Unknown command '${val}'`);
                }
                output.scrollTop = output.scrollHeight;
            }
        });

        function print(text, cls = '') {
            const p = document.createElement('p');
            p.className = 'line ' + cls;
            p.innerText = text;
            output.appendChild(p);
        }
    </script>
</body>
</html>
