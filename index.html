<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <title>BELO | POWER SYSTEM V3</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=JetBrains+Mono:wght@800&display=swap');
        :root { --primary: #ff0000; --secondary: #00ff41; --bg: #000; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); overflow: hidden; font-family: 'JetBrains Mono', monospace; }
        #matrix { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; opacity: 0.35; }
        #terminal { position: relative; z-index: 10; height: 100vh; display: flex; flex-direction: column; padding: 25px; box-sizing: border-box; background: radial-gradient(circle, transparent 30%, rgba(0,0,0,0.9) 100%); }
        .power-header { text-align: center; margin-bottom: 20px; }
        .main-title { 
            font-family: 'Orbitron', sans-serif; font-size: 5rem; color: #fff; 
            text-shadow: 0 0 10px var(--primary), 0 0 20px var(--primary);
            animation: pulse 1.5s infinite alternate; letter-spacing: 12px; margin: 0;
        }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.05); } }
        .output { flex: 1; overflow-y: auto; scrollbar-width: none; color: var(--secondary); }
        .line { margin-bottom: 6px; font-size: 1.1rem; text-shadow: 0 0 8px var(--secondary); font-weight: bold; }
        .cmd-out { color: #fff; border-left: 5px solid var(--primary); padding-left: 15px; margin: 15px 0; background: rgba(255,0,0,0.15); }
        .social-btn { 
            display: inline-block; padding: 10px 20px; margin: 10px 5px; 
            color: #fff; text-decoration: none; border: 2px solid var(--secondary);
            font-weight: 900; text-transform: uppercase; transition: 0.3s;
            box-shadow: 0 0 10px var(--secondary);
        }
        .social-btn:hover { background: var(--secondary); color: #000; box-shadow: 0 0 25px var(--secondary); }
        .input-area { display: flex; align-items: center; background: rgba(10,10,10,0.9); border: 2px solid var(--primary); padding: 18px; box-shadow: 0 0 30px rgba(255,0,0,0.5); }
        .prompt { margin-right: 15px; color: var(--primary); font-weight: 900; font-size: 1.4rem; }
        #cmd-input { background: none; border: none; color: #fff; font-family: inherit; font-size: 1.4rem; width: 100%; outline: none; }
        .shake { animation: shake-anim 0.3s both; }
        @keyframes shake-anim { 10%, 90% { transform: translate3d(-1px, 0, 0); } 40%, 60% { transform: translate3d(4px, 0, 0); } }
    </style>
</head>
<body onclick="initAudio()">
    <canvas id="matrix"></canvas>
    <div id="terminal">
        <div class="power-header"><h1 class="main-title">BELO</h1></div>
        <div class="output" id="out"><p class="line">> SYSTEM_BOOT: SUCCESSFUL</p></div>
        <div class="input-area"><span class="prompt">root@belo:~#</span><input type="text" id="cmd-input" autofocus autocomplete="off"></div>
    </div>
    <script>
        const canvas = document.getElementById('matrix'); const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const text = "BELO 01 "; const fontSize = 18; const rows = Math.floor(canvas.height / fontSize);
        const xPositions = Array(rows).fill(0);
        function drawMatrix() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.1)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#ff0000"; ctx.font = "900 " + fontSize + "px monospace";
            xPositions.forEach((x, i) => {
                ctx.fillText(text.charAt(Math.floor(Math.random() * text.length)), x * fontSize, i * fontSize);
                if (x * fontSize > canvas.width && Math.random() > 0.98) xPositions[i] = 0;
                xPositions[i]++;
            });
        }
        setInterval(drawMatrix, 35);
        let audioCtx; function initAudio() { if(!audioCtx) audioCtx = new AudioContext(); }
        function playSound(f, d, g=0.1) {
            if(!audioCtx) return;
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.frequency.value = f; gain.gain.setValueAtTime(g, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + d);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + d);
        }
        const input = document.getElementById('cmd-input'); const out = document.getElementById('out');
        const termContainer = document.getElementById('terminal');
        async function runCommand(cmd) {
            termContainer.classList.add('shake'); setTimeout(() => termContainer.classList.remove('shake'), 300);
            printLine(`<span style="color:#fff;">[EXEC] ${cmd}</span>`);
            if (cmd === 'help') { printLine("COMMANDS: socials, bypass, inject, ddos, bio, clear"); }
            else if (cmd === 'socials') {
                printLine("DECRYPTING PERSONAL ACCESS NODES..."); await sleep(600);
                printLine(`<a href="https://www.instagram.com/i_eminki.01" target="_blank" class="social-btn">Instagram</a> <a href="https://snapchat.com/t/FIuxhe8f" target="_blank" class="social-btn">Snapchat</a>`, "cmd-out");
            }
            else if (cmd === 'bypass') { printLine("OVERRIDING..."); await sleep(600); printLine("FIREWALL DOWN.", "cmd-out"); }
            else if (cmd === 'inject') { printLine("SQL_INJECTING..."); await sleep(600); printLine("DB_DUMP_COMPLETE.", "cmd-out"); }
            else if (cmd === 'ddos') { printLine("SENDING PACKETS..."); await sleep(600); printLine("OFFLINE.", "cmd-out"); }
            else if (cmd === 'bio') { printLine("UNDERESTIMATE ME. THAT’LL BE FUN.", "cmd-out"); }
            else if (cmd === 'clear') { out.innerHTML = ''; }
            else { printLine("ERROR: NOT_FOUND"); }
            out.scrollTop = out.scrollHeight;
        }
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') { playSound(50, 0.4, 0.4); runCommand(input.value.trim().toLowerCase()); input.value = ''; }
            else { playSound(180, 0.08, 0.1); }
        });
        function printLine(txt, cls = '') { const p = document.createElement('p'); p.className = 'line ' + cls; p.innerHTML = txt; out.appendChild(p); }
        function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
    </script>
</body>
</html>
