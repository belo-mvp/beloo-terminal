<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BELO | TERMINAL</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=JetBrains+Mono:wght@700&display=swap');
        :root { --primary: #ff0000; --secondary: #00ff41; --bg: #000; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); overflow: hidden; font-family: 'JetBrains Mono', monospace; color: var(--secondary); }
        #matrix { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; opacity: 0.2; }
        #terminal { position: relative; z-index: 10; height: 100vh; display: flex; flex-direction: column; padding: 15px; box-sizing: border-box; background: rgba(0,0,0,0.85); }
        
        .header-tools { display: flex; justify-content: space-between; align-items: center; padding: 5px 10px; border: 1px solid var(--primary); background: rgba(255,0,0,0.1); border-radius: 5px; margin-bottom: 10px; }
        #digital-clock { font-family: 'Orbitron', sans-serif; color: #fff; font-size: 1.1rem; text-shadow: 0 0 10px var(--primary); font-weight: 900; }
        .sys-status { font-size: 0.8rem; color: var(--primary); text-transform: uppercase; letter-spacing: 3px; font-weight: 900; }

        .profile-section { position: relative; width: 180px; height: 180px; margin: 5px auto; display: flex; justify-content: center; align-items: center; }
        .rotating-txt { position: absolute; width: 100%; height: 100%; animation: rotateText 10s linear infinite; }
        @keyframes rotateText { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .rotating-txt svg { width: 100%; height: 100%; overflow: visible; }
        .rotating-txt text { fill: var(--primary); font-weight: 900; font-size: 14px; text-transform: lowercase; letter-spacing: 3px; }
        
        .profile-img { width: 115px; height: 115px; border-radius: 50%; border: 3px solid var(--primary); overflow: hidden; box-shadow: 0 0 20px var(--primary); z-index: 5; display: flex; justify-content: center; align-items: center; background: #000; }
        #profile-video { width: 100%; height: 100%; object-fit: cover; }
        
        .output-box { flex: 1; overflow-y: auto; padding: 10px; border: 1px solid rgba(255,0,0,0.3); margin-bottom: 10px; border-radius: 5px; background: rgba(0,0,0,0.4); }
        .line { margin-bottom: 5px; font-size: 0.82rem; line-height: 1.4; }
        .cmd-color { color: #fff; font-weight: bold; background: rgba(255,0,0,0.2); padding: 2px 5px; }
        .highlight { color: var(--primary); font-weight: bold; }
        .success { color: #00ff41; font-weight: bold; }
        .btn-link { display: block; color: #fff; text-decoration: none; border: 2px solid var(--primary); padding: 12px; margin: 10px 0; background: rgba(255,0,0,0.2); text-align: center; font-weight: bold; transition: 0.4s; border-radius: 5px; }
        
        .input-wrap { display: flex; align-items: center; background: rgba(255,0,0,0.1); padding: 10px; border-radius: 5px; border: 1px solid rgba(255,0,0,0.3); }
        .prefix { color: var(--primary); font-weight: 900; margin-right: 10px; font-size: 0.8rem; }
        #user-input { background: none; border: none; color: #fff; font-family: inherit; font-size: 1rem; width: 100%; outline: none; }
    </style>
</head>
<body>
    <canvas id="matrix"></canvas>
    <div id="terminal">
        <div class="header-tools">
            <div class="sys-status">BELO SYSTEM</div>
            <div id="digital-clock">00:00:00</div>
        </div>

        <div class="profile-section">
            <div class="rotating-txt">
                <svg viewBox="0 0 200 200">
                    <path id="txtPath" d="M 100, 100 m -80, 0 a 80,80 0 1,1 160,0 a 80,80 0 1,1 -160,0" fill="transparent"/>
                    <text><textPath href="#txtPath">mvp.belo • mvp.belo • mvp.belo • mvp.belo • </textPath></text>
                </svg>
            </div>
            <div class="profile-img">
                <!-- ڤیدیۆ ب شێوەیێ Loop و Muted جێگیر بوو -->
                <video autoplay muted loop playsinline id="profile-video">
                    <source src="video.mp4.mov" type="video/mp4">
                </video>
            </div>
        </div>

        <div class="output-box" id="terminal-out"></div>

        <div class="input-wrap">
            <span class="prefix">ROOT@BELO:~$</span>
            <input type="text" id="user-input" autofocus autocomplete="off">
        </div>
    </div>

    <script>
        const canvas = document.getElementById('matrix'); const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const chars = "01";
        const drops = Array(Math.floor(canvas.width/15)).fill(1);
        function drawMatrix() {
            ctx.fillStyle = "rgba(0,0,0,0.05)"; ctx.fillRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = "#ff0000"; ctx.font = "15px monospace";
            drops.forEach((y,x) => {
                ctx.fillText(chars[Math.floor(Math.random()*chars.length)], x*15, y*15);
                if(y*15 > canvas.height && Math.random() > 0.975) drops[x] = 0;
                drops[x]++;
            });
        }
        setInterval(drawMatrix, 35);

        function updateClock() {
            const now = new Date();
            document.getElementById('digital-clock').innerText = now.toLocaleTimeString('en-GB');
        }
        setInterval(updateClock, 1000); updateClock();

        const out = document.getElementById('terminal-out');
        const input = document.getElementById('user-input');

        async function typeWrite(text, cls = '', delay = 20) {
            const div = document.createElement('div');
            div.className = 'line ' + cls;
            out.appendChild(div);
            for (let char of text) {
                div.innerHTML += char;
                await new Promise(r => setTimeout(r, delay));
            }
            out.scrollTop = out.scrollHeight;
        }

        async function processCmd(cmd) {
            const command = cmd.toLowerCase().trim();
            if(!command) return;
            await typeWrite(`> ${cmd}`, 'cmd-color');

            if (command === 'help') {
                await typeWrite("COMMANDS: scan-ip, overclock, ping, social, clear");
            } else if (command === 'scan-ip') {
                await typeWrite("Scanning network...");
                try {
                    const res = await fetch('https://api.ipify.org?format=json');
                    const data = await res.json();
                    await typeWrite(`IP_FOUND: ${data.ip}`, "success");
                } catch(e) { await typeWrite("ERR: Bypass failed."); }
            } else if (command === 'overclock') {
                await typeWrite("SYSTEM OVERCLOCK INITIATED...", "highlight");
                await new Promise(r => setTimeout(r, 600));
                await typeWrite("PERFORMANCE STABILIZED AT 150%.", "success");
            } else if (command === 'social') {
                const links = document.createElement('div');
                links.innerHTML = `
                    <a href="https://www.instagram.com/i_eminki.01" target="_blank" class="btn-link">INSTAGRAM</a>
                    <a href="https://snapchat.com/t/FIuxhe8f" target="_blank" class="btn-link">SNAPCHAT</a>
                    <a href="https://www.tiktok.com/@1st.belo?_r=1&_t=ZS-962fAMmUuvK" target="_blank" class="btn-link">TIKTOK</a>`;
                out.appendChild(links);
            } else if (command === 'clear') {
                out.innerHTML = '';
            } else {
                await typeWrite("Command not found.");
            }
            out.scrollTop = out.scrollHeight;
        }

        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') { processCmd(input.value); input.value = ''; }
        });

        window.onload = () => { 
            typeWrite("BELO SYSTEM ONLINE...", "highlight");
        };
    </script>
</body>
</html>
