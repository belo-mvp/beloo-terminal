<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MVP BELO | THE ULTIMATE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@100;700&display=swap');
        
        :root { --neon: #00ff41; --bg: #000; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); overflow: hidden; font-family: 'JetBrains Mono', monospace; }

        /* Matrix Canvas */
        #matrix { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; opacity: 0.25; }

        /* Terminal Content */
        #content { position: relative; z-index: 10; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; color: var(--neon); background: radial-gradient(circle, rgba(0,255,65,0.02) 0%, rgba(0,0,0,1) 100%); }

        .time { position: absolute; top: 30px; font-size: 1.2rem; letter-spacing: 5px; font-weight: 100; text-shadow: 0 0 10px var(--neon); }

        .main-name { font-size: 5rem; font-weight: 700; letter-spacing: 15px; margin: 0; text-transform: uppercase; filter: drop-shadow(0 0 20px var(--neon)); animation: flicker 3s infinite; }

        .quote { margin-top: 20px; font-size: 1rem; letter-spacing: 8px; color: #fff; text-transform: uppercase; opacity: 0.7; }

        .nav { margin-top: 60px; display: flex; gap: 30px; }
        .nav a { text-decoration: none; color: #fff; border: 1px solid var(--neon); padding: 12px 30px; font-size: 0.8rem; letter-spacing: 3px; transition: 0.4s; position: relative; overflow: hidden; }
        .nav a:hover { background: var(--neon); color: #000; box-shadow: 0 0 30px var(--neon); transform: translateY(-5px); }

        @keyframes flicker { 0%, 18%, 22%, 25%, 53%, 57%, 100% { opacity: 1; } 20%, 24%, 55% { opacity: 0.7; } }
    </style>
</head>
<body>

    <canvas id="matrix"></canvas>

    <div id="content">
        <div class="time" id="clock">00:00:00</div>
        
        <h1 class="main-name">MVP BELO</h1>
        <p class="quote">Underestimate me. That’ll be fun.</p>

        <div class="nav">
            <a href="https://www.instagram.com/i_eminki.01" target="_blank">INSTAGRAM</a>
            <a href="https://snapchat.com/t/FIuxhe8f" target="_blank">SNAPCHAT</a>
            <a href="https://www.tiktok.com/@1st.belo" target="_blank">TIKTOK</a>
        </div>
    </div>

    <script>
        // Matrix Effect
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const text = "MVP BELO ";
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);

        function drawMatrix() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#0f0";
            ctx.font = fontSize + "px monospace";

            drops.forEach((y, i) => {
                const char = text.charAt(Math.floor(Math.random() * text.length));
                ctx.fillText(char, i * fontSize, y * fontSize);
                if (y * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(drawMatrix, 50);

        // Clock
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.getHours().toString().padStart(2, '0') + " : " + now.getMinutes().toString().padStart(2, '0') + " : " + now.getSeconds().toString().padStart(2, '0');
        }
        setInterval(updateClock, 1000); updateClock();
    </script>
</body>
</html>
