<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BELO | TOP-LEVEL INTERFACE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=JetBrains+Mono:wght@500;800&display=swap');
        :root { --primary: #ff0000; --secondary: #00ff41; --bg: #000; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); overflow: hidden; font-family: 'JetBrains Mono', monospace; color: var(--secondary); }
        #matrix { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; opacity: 0.4; }
        #terminal { position: relative; z-index: 10; height: 100vh; display: flex; flex-direction: column; padding: 30px; box-sizing: border-box; background: radial-gradient(circle, transparent 20%, #000 100%); }
        .header { border-bottom: 2px solid var(--primary); padding-bottom: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; font-family: 'Syncopate', sans-serif; font-size: 0.8rem; text-shadow: 0 0 15px var(--primary); color: #fff; }
        .glitch-wrap { text-align: center; margin-bottom: 30px; }
        .main-title { font-size: 5rem; font-weight: 800; color: #fff; text-shadow: 3px 0 var(--primary), -3px 0 var(--secondary); animation: glitch-anim 0.2s infinite ease-in-out alternate; }
        @keyframes glitch-anim { 0% { transform: skew(3deg); } 100% { transform: skew(-3deg); } }
        .output { flex: 1; overflow-y: auto; scrollbar-width: none; }
        .output::-webkit-scrollbar { display: none; }
        .line { margin-bottom: 8px; line-height: 1.2; text-shadow: 0 0 5px var(--secondary); }
        .cmd-out { color: #fff; border-left: 3px solid var(--primary); padding-left: 15px; margin: 15px 0; background: rgba(255,0,0,0.1); font-weight: bold; }
        .social-link { color: #00ff41; text-decoration: none; border: 1px solid #00ff41; padding: 2px 10px; margin: 5px; display: inline-block; transition: 0.3s; }
        .social-link:hover { background: #00ff41; color: #000; box-shadow: 0 0 15px #00ff41; }
        .input-area { display: flex; align-items: center; background: rgba(255,0,0,0.15); border: 1px solid var(--primary); padding: 15px; box-shadow: 0 0 20px var(--primary); }
        .prompt { margin-right: 15px; color: #fff; font-weight: 800; }
        #cmd-input { background: none; border: none; color: var(--secondary); font-family: inherit; font-size: 1.3rem; width: 100%; outline: none; font-weight: bold; }
        .scan-line { width: 100%; height: 2px; background: var(--primary); position: absolute; top: 0; left: 0; z-index: 100; animation: scan 3s infinite linear; opacity: 0.5; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
    </style>
</head>
<body onclick="initAudio()">
    <div class="scan-line"></div>
    <canvas id="matrix"></canvas>
    <div id="terminal">
        <div class="header"><div>[LEVEL: TOP_LEVEL_ADMIN]</div><div id="clock">00:00:00</div></div>
        <div class="output" id="out">
            <div class="glitch-wrap"><h1 class="main-title">BELO</h1></div>
            <p class="line">> TOP-LEVEL PROTOCOLS ENGAGED... (DUHOK_SECURE_LINE)</p>
        </div>
        <div class="input-area"><span class="prompt">#</span><input type="text" id="cmd-input" autofocus autocomplete="off" placeholder="Enter Top-Level command..."></div>
    </div>

    <script>
        const canvas = document.getElementById('matrix'); const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const text = "BELO "; const fontSize = 22; const rows = Math.floor(canvas.height / fontSize);
        const xPositions = Array(rows).fill(0);
        function drawMatrix() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.1)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#ff0000"; ctx.font = "900 " + fontSize + "px monospace";
            xPositions.forEach((x, i) => {
                const char = text.charAt(Math.floor(Math.random() * text.length));
                ctx.fillText(char, x * fontSize, i * fontSize);
                if (x * fontSize > canvas.width && Math.random() > 0.99) xPositions[i] = 0;
                xPositions[i]++;
            });
        }
        setInterval(drawMatrix, 25);

        let audioCtx; 
        function initAudio() { if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
        function playClick(type) {
            if(!audioCtx) return;
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain(); const filter = audioCtx.createBiquadFilter();
            const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.05, audioCtx.sampleRate);
            const data = buffer.getChannelData(0); for (let i = 0; i < buffer.length; i++) { data[i] = Math.random() * 2 - 1; }
            const noise = audioCtx.createBufferSource(); noise.buffer = buffer;
            filter.type = "bandpass"; filter.frequency.value = type === 'enter' ? 1200 : 3500;
            gain.gain.setValueAtTime(type === 'enter' ? 0.3 : 0.15, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            noise.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
            noise.start();
        }

        function updateClock() { const now = new Date(); document.getElementById('clock').innerText = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0') + ":" + now.getSeconds().toString().padStart(2, '0'); }
        setInterval(updateClock, 1000);

        const input = document.getElementById('cmd-input'); const out = document.getElementById('out');
        const links = { 'instagram': "https://www.instagram.com/i_eminki.01", 'snapchat': "https://snapchat.com/t/FIuxhe8f", 'tiktok': "https://www.tiktok.com/@1st.belo" };

        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                playClick('enter');
                const cmd = input.value.trim().toLowerCase(); input.value = '';
                printLine(`<span style="color:#fff;"># ${cmd}</span>`);

                if (cmd === 'help') { printLine("TOP-CMDS: system-override, neural-link, global-ping, encrypt-all, satellite-hi, socials, bio, clear"); }
                else if (cmd === 'system-override') { printLine("BYPASSING ENCRYPTION... [██████████] 100%", "cmd-out"); setTimeout(() => printLine("SYSTEM CONTROL: GRANTED"), 800); }
                else if (cmd === 'neural-link') { printLine("SYNCING WITH NEURAL NET...", "cmd-out"); setTimeout(() => printLine("THOUGHT-TO-CODE: ACTIVE"), 1000); }
                else if (cmd === 'global-ping') { printLine("PINGING SERVERS: USA, GER, JPN, DUHOK...", "cmd-out"); setTimeout(() => printLine("ALL NODES: RESPONDING (12ms)"), 1200); }
                else if (cmd === 'encrypt-all') { printLine("RUNNING RSA-4096...", "cmd-out"); setTimeout(() => printLine("DATA SECURED."), 500); }
                else if (cmd === 'satellite-hi') { printLine("HIJACKING STARLINK...", "cmd-out"); setTimeout(() => printLine("LOCATION: DUHOK, KURDISTAN [LOCKED]"), 800); }
                else if (cmd === 'socials') { printLine("FETCHING ACCOUNTS...", "cmd-out"); printLine(`<a href="${links.instagram}" target="_blank" class="social-link">INSTAGRAM</a><a href="${links.snapchat}" target="_blank" class="social-link">SNAPCHAT</a><a href="${links.tiktok}" target="_blank" class="social-link">TIKTOK</a>`); }
                else if (cmd === 'bio') { printLine("UNDERESTIMATE ME. THAT’LL BE FUN.", "cmd-out"); }
                else if (cmd === 'clear') { out.innerHTML = ''; }
                else { printLine("ERROR: TOP_LEVEL_AUTH_FAILED", "cmd-out"); }
                out.scrollTop = out.scrollHeight;
            } else { playClick('key'); }
        });
        function printLine(txt, cls = '') { const p = document.createElement('p'); p.className = 'line ' + cls; p.innerHTML = txt; out.appendChild(p); }
    </script>
</body>
</html>
