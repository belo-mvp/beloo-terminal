<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MVP BELO | GOD MODE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=JetBrains+Mono:wght@500;800&display=swap');
        :root { --primary: #ff0000; --secondary: #00ff41; --bg: #000; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); overflow: hidden; font-family: 'JetBrains Mono', monospace; color: var(--secondary); }
        #matrix { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; opacity: 0.6; }
        #terminal { position: relative; z-index: 10; height: 100vh; display: flex; flex-direction: column; padding: 30px; box-sizing: border-box; background: radial-gradient(circle, transparent 20%, #000 100%); transition: 0.5s; }
        .header { border-bottom: 2px solid var(--primary); padding-bottom: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; font-family: 'Syncopate', sans-serif; font-size: 0.8rem; text-shadow: 0 0 15px var(--primary); color: #fff; }
        .glitch-wrap { text-align: center; margin-bottom: 30px; }
        .main-title { font-size: 5rem; font-weight: 800; color: #fff; text-shadow: 3px 0 var(--primary), -3px 0 var(--secondary); animation: glitch-anim 0.2s infinite ease-in-out alternate; }
        @keyframes glitch-anim { 0% { transform: skew(3deg); } 100% { transform: skew(-3deg); } }
        .output { flex: 1; overflow-y: auto; scrollbar-width: none; }
        .output::-webkit-scrollbar { display: none; }
        .line { margin-bottom: 8px; line-height: 1.2; text-shadow: 0 0 5px var(--secondary); }
        .cmd-out { color: #fff; border-left: 3px solid var(--primary); padding-left: 15px; margin: 15px 0; background: rgba(255,0,0,0.1); }
        .input-area { display: flex; align-items: center; background: rgba(255,0,0,0.15); border: 1px solid var(--primary); padding: 15px; box-shadow: 0 0 20px var(--primary); }
        .prompt { margin-right: 15px; color: #fff; font-weight: 800; }
        #cmd-input { background: none; border: none; color: var(--secondary); font-family: inherit; font-size: 1.3rem; width: 100%; outline: none; font-weight: bold; }
        .shutdown { transform: scale(0); opacity: 0; }
    </style>
</head>
<body onclick="initAudio()">
    <canvas id="matrix"></canvas>
    <div id="terminal">
        <div class="header"><div>[AUTH: SUPREME_OVERLORD]</div><div id="clock">00:00:00</div></div>
        <div class="output" id="out">
            <div class="glitch-wrap"><h1 class="main-title">BELO</h1></div>
            <p class="line">> KERNEL V10.9 STABLE...</p>
        </div>
        <div class="input-area"><span class="prompt">#</span><input type="text" id="cmd-input" autofocus autocomplete="off" placeholder="..."></div>
    </div>
    <script>
        const canvas = document.getElementById('matrix'); const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const text = "BELO "; const fontSize = 22; const rows = Math.floor(canvas.height / fontSize);
        const xPositions = Array(rows).fill(0);
        function drawMatrix() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.1)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#ff0000"; ctx.font = "900 " + fontSize + "px monospace";
            xPositions.forEach((x, i) => {
                const char = text.charAt(Math.floor(Math.random() * text.length));
                ctx.fillText(char, x * fontSize, i * fontSize);
                if (x * fontSize > canvas.width && Math.random() > 0.99) xPositions[i] = 0;
                xPositions[i]++;
            });
        }
        setInterval(drawMatrix, 25);

        let audioCtx; function initAudio() { if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
        function playSound(f, t, d, v=0.1) { if(!audioCtx) return; const o = audioCtx.createOscillator(); const g = audioCtx.createGain(); o.type = t; o.frequency.setValueAtTime(f, audioCtx.currentTime); g.gain.setValueAtTime(v, audioCtx.currentTime); o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + d); }

        function updateClock() { const now = new Date(); document.getElementById('clock').innerText = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0') + ":" + now.getSeconds().toString().padStart(2, '0'); }
        setInterval(updateClock, 1000);

        const input = document.getElementById('cmd-input'); const out = document.getElementById('out');
        const links = { 'instagram': "https://www.instagram.com/i_eminki.01", 'snapchat': "https://snapchat.com/t/FIuxhe8f", 'tiktok': "https://www.tiktok.com/@1st.belo" };

        input.addEventListener('input', () => { playSound(180, 'square', 0.02, 0.05); });

        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                playSound(120, 'sawtooth', 0.15, 0.2);
                const cmd = input.value.trim().toLowerCase(); input.value = '';
                printLine(`<span style="color:#fff;"># ${cmd}</span>`);

                if (cmd === 'help') { printLine("ELITE CMDS: neural-link, satellite-hi, pubg-aim, black-hole, overload, decrypt, socials, clear"); }
                else if (cmd === 'neural-link') { printLine("CONNECTING TO CORTEX...", "cmd-out"); setTimeout(() => printLine("LINK ESTABLISHED. 540Gbps UP."), 1000); }
                else if (cmd === 'satellite-hi') { printLine("HIJACKING STARLINK-9...", "cmd-out"); setTimeout(() => printLine("LOCATION: ZAKHO [LOCKED]"), 900); }
                else if (cmd === 'pubg-aim') { printLine("LOADING AIM_CALIBRATOR v4.0...", "cmd-out"); setTimeout(() => printLine("NO_RECOIL: ACTIVE | HEADSHOT_LOCK: 100%"), 1100); }
                else if (cmd === 'black-hole') { printLine("CRITICAL GRAVITY DETECTED...", "cmd-out"); setTimeout(() => { out.innerHTML = ''; printLine("Everything consumed."); }, 1500); }
                else if (cmd === 'overload') { printLine("BYPASSING POWER GRID...", "cmd-out"); setTimeout(() => printLine("STATUS: BLACKOUT INITIATED"), 800); }
                else if (links[cmd]) { printLine(`OPENING ${cmd.toUpperCase()}...`); setTimeout(() => window.open(links[cmd], '_blank'), 500); }
                else if (cmd === 'clear') { out.innerHTML = ''; }
                else { printLine("ACCESS_DENIED: UNAUTHORIZED_INPUT", "cmd-out"); }
                out.scrollTop = out.scrollHeight;
            }
        });
        function printLine(txt, cls = '') { const p = document.createElement('p'); p.className = 'line ' + cls; p.innerHTML = txt; out.appendChild(p); }
    </script>
</body>
</html>
