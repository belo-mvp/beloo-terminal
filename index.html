<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BELO | POWER V4</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=JetBrains+Mono:wght@700&display=swap');
        :root { --primary: #ff0000; --secondary: #00ff41; --bg: #000; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); overflow: hidden; font-family: 'JetBrains Mono', monospace; }
        #matrix { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; opacity: 0.3; }
        #terminal { position: relative; z-index: 10; height: 100vh; display: flex; flex-direction: column; padding: 15px; box-sizing: border-box; }
        
        .power-header { text-align: center; margin-bottom: 10px; }
        .main-title { 
            font-family: 'Orbitron', sans-serif; font-size: 3.5rem; color: #fff; 
            text-shadow: 0 0 15px var(--primary); animation: pulse 1.5s infinite alternate;
            letter-spacing: 8px; margin: 0;
        }
        @keyframes pulse { from { transform: scale(0.95); } to { transform: scale(1); } }

        .output { flex: 1; overflow-y: auto; scrollbar-width: none; color: var(--secondary); margin-bottom: 10px; }
        .output::-webkit-scrollbar { display: none; }
        .line { margin-bottom: 4px; font-size: 0.95rem; line-height: 1.2; text-shadow: 0 0 5px var(--secondary); }
        .cmd-out { color: #fff; border-left: 3px solid var(--primary); padding-left: 10px; margin: 8px 0; background: rgba(255,0,0,0.1); }
        
        .social-btn { 
            display: inline-block; padding: 8px 15px; margin: 5px 2px; 
            color: #fff; text-decoration: none; border: 1px solid var(--secondary);
            font-size: 0.8rem; font-weight: 900; box-shadow: 0 0 10px var(--secondary);
        }

        .input-area { 
            display: flex; align-items: center; background: rgba(0,0,0,0.9); 
            border: 1px solid var(--primary); padding: 12px; 
            box-shadow: 0 0 20px rgba(255,0,0,0.4);
        }
        .prompt { margin-right: 8px; color: var(--primary); font-weight: 900; font-size: 1.1rem; }
        #cmd-input { background: none; border: none; color: #fff; font-family: inherit; font-size: 1.1rem; width: 100%; outline: none; }
        .shake { animation: shake-anim 0.2s ease-in-out; }
        @keyframes shake-anim { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
    </style>
</head>
<body onclick="initAudio()">
    <canvas id="matrix"></canvas>
    <div id="terminal">
        <div class="power-header"><h1 class="main-title">BELO</h1></div>
        <div class="output" id="out"><p class="line">> ROOT_READY</p></div>
        <div class="input-area">
            <span class="prompt">#</span>
            <input type="text" id="cmd-input" autofocus autocomplete="off" placeholder="Type help...">
        </div>
    </div>

    <script>
        const canvas = document.getElementById('matrix'); const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const text = "BELO "; const fontSize = 16; const rows = Math.floor(canvas.height / fontSize);
        const xPositions = Array(rows).fill(0);
        function drawMatrix() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.1)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#ff0000"; ctx.font = "900 " + fontSize + "px monospace";
            xPositions.forEach((x, i) => {
                ctx.fillText(text.charAt(Math.floor(Math.random() * text.length)), x * fontSize, i * fontSize);
                if (x * fontSize > canvas.width && Math.random() > 0.98) xPositions[i] = 0;
                xPositions[i]++;
            });
        }
        setInterval(drawMatrix, 35);

        let audioCtx; function initAudio() { if(!audioCtx) audioCtx = new AudioContext(); }
        function playSound(f, d, g=0.1) {
            if(!audioCtx) return;
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.frequency.value = f; gain.gain.setValueAtTime(g, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + d);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + d);
        }

        const input = document.getElementById('cmd-input'); const out = document.getElementById('out');
        async function runCommand(cmd) {
            document.getElementById('terminal').classList.add('shake');
            setTimeout(() => document.getElementById('terminal').classList.remove('shake'), 200);
            printLine(`<span style="color:#fff;">$ ${cmd}</span>`);
            if (cmd === 'help') { printLine("socials, bypass, inject, ddos, bio, clear"); }
            else if (cmd === 'socials') {
                await sleep(400);
                printLine(`<a href="https://www.instagram.com/i_eminki.01" target="_blank" class="social-btn">INSTA</a> <a href="https://snapchat.com/t/FIuxhe8f" target="_blank" class="social-btn">SNAP</a>`, "cmd-out");
            }
            else if (cmd === 'bypass') { await sleep(400); printLine("FW_OVERRIDDEN", "cmd-out"); }
            else if (cmd === 'inject') { await sleep(400); printLine("DB_DUMPED", "cmd-out"); }
            else if (cmd === 'ddos') { await sleep(400); printLine("STRIKE_COMPLETE", "cmd-out"); }
            else if (cmd === 'bio') { printLine("Underestimate me. That’ll be fun.", "cmd-out"); }
            else if (cmd === 'clear') { out.innerHTML = ''; }
            else { printLine("ERR: ACCESS_DENIED"); }
            out.scrollTo({ top: out.scrollHeight, behavior: 'smooth' });
        }

        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') { playSound(60, 0.3, 0.3); runCommand(input.value.trim().toLowerCase()); input.value = ''; }
            else { playSound(180, 0.05, 0.05); }
        });

        function printLine(txt, cls = '') { const p = document.createElement('p'); p.className = 'line ' + cls; p.innerHTML = txt; out.appendChild(p); out.scrollTop = out.scrollHeight; }
        function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
    </script>
</body>
</html>
