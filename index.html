<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BELO | ULTIMATE SYSTEM</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=JetBrains+Mono:wght@700&display=swap');
        :root { --primary: #ff0000; --secondary: #00ff41; --bg: #000; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); overflow: hidden; font-family: 'JetBrains Mono', monospace; }
        #matrix { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; opacity: 0.2; }
        #terminal { position: relative; z-index: 10; height: 100vh; display: flex; flex-direction: column; padding: 15px; box-sizing: border-box; }
        .main-title { 
            font-family: 'Orbitron', sans-serif; font-size: 3.5rem; color: #fff; text-align: center;
            text-shadow: 0 0 20px var(--primary); animation: pulse 2s infinite alternate; letter-spacing: 10px; margin: 10px 0;
        }
        @keyframes pulse { from { transform: scale(0.95); opacity: 0.8; } to { transform: scale(1); opacity: 1; } }
        .output { flex: 1; overflow-y: auto; scrollbar-width: none; color: var(--secondary); }
        .line { margin-bottom: 5px; font-size: 0.9rem; font-weight: bold; }
        .ghost-line { color: #ff0000; text-shadow: 0 0 10px #ff0000; background: rgba(255,0,0,0.1); padding: 8px; border-left: 4px solid #ff0000; margin: 10px 0; }
        .social-link { display: block; color: #fff; text-decoration: none; border: 1px solid #ff0000; padding: 8px; margin-bottom: 5px; background: rgba(255,0,0,0.15); font-size: 0.85rem; text-align: center; box-shadow: 0 0 10px rgba(255,0,0,0.3); }
        .input-area { display: flex; align-items: center; background: rgba(10,10,10,0.95); border: 2px solid var(--primary); padding: 12px; box-shadow: 0 0 20px var(--primary); }
        .prompt { margin-right: 10px; color: var(--primary); font-weight: 900; font-size: 1.2rem; }
        #cmd-input { background: none; border: none; color: #fff; font-family: inherit; font-size: 1.2rem; width: 100%; outline: none; }
    </style>
</head>
<body onclick="initAudio()">
    <canvas id="matrix"></canvas>
    <div id="terminal">
        <h1 class="main-title">BELO</h1>
        <div class="output" id="out"><p class="line">> SYSTEM_V6_LOADED: READY</p></div>
        <div class="input-area"><span class="prompt">#</span><input type="text" id="cmd-input" autofocus autocomplete="off" placeholder="Type help..."></div>
    </div>

    <script>
        const canvas = document.getElementById('matrix'); const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const text = "BELO 01 "; const fontSize = 16; const rows = Math.floor(canvas.height / fontSize);
        const xPositions = Array(rows).fill(0);
        function drawMatrix() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.1)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#ff0000"; ctx.font = "900 " + fontSize + "px monospace";
            xPositions.forEach((x, i) => {
                ctx.fillText(text.charAt(Math.floor(Math.random() * text.length)), x * fontSize, i * fontSize);
                if (x * fontSize > canvas.width && Math.random() > 0.98) xPositions[i] = 0;
                xPositions[i]++;
            });
        }
        setInterval(drawMatrix, 35);

        let audioCtx; function initAudio() { if(!audioCtx) audioCtx = new AudioContext(); }
        function playSfx(f, d, g=0.1) {
            if(!audioCtx) return;
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.frequency.setValueAtTime(f, audioCtx.currentTime);
            gain.gain.setValueAtTime(g, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + d);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + d);
        }

        const input = document.getElementById('cmd-input'); const out = document.getElementById('out');
        async function runCommand(cmd) {
            printLine(`<span style="color:#fff;">$ ${cmd}</span>`);
            if (cmd === 'help') {
                printLine("--- SYSTEM_COMMANDS ---", "ghost-line");
                printLine("> socials : Access Social Links");
                printLine("> bio     : View Personal Bio");
                printLine("> clear   : Reset Terminal");
            }
            else if (cmd === 'socials') {
                printLine("DECRYPTING SOCIAL CHANNELS...", "ghost-line");
                await sleep(500);
                printLine(`<a href="https://www.instagram.com/i_eminki.01" target="_blank" class="social-link">INSTAGRAM: @i_eminki.01</a>`);
                printLine(`<a href="https://snapchat.com/t/FIuxhe8f" target="_blank" class="social-link">SNAPCHAT: @belo-mvp</a>`);
                printLine(`<a href="https://www.tiktok.com/@i_eminki.01" target="_blank" class="social-link">TIKTOK: @i_eminki.01</a>`);
            }
            else if (cmd === 'bio') { printLine("Underestimate me. That’ll be fun.", "ghost-line"); }
            else if (cmd === 'clear') { out.innerHTML = ''; }
            else { printLine("ERR: COMMAND_UNKNOWN"); }
            out.scrollTop = out.scrollHeight;
        }

        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') { playSfx(60, 0.4, 0.3); runCommand(input.value.trim().toLowerCase()); input.value = ''; }
            else { playSfx(200, 0.05, 0.05); }
        });

        function printLine(txt, cls = '') { const p = document.createElement('p'); p.className = 'line ' + cls; p.innerHTML = txt; out.appendChild(p); out.scrollTop = out.scrollHeight; }
        function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
    </script>
</body>
</html>
