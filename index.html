<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MVP BELO | OVERLORD</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=JetBrains+Mono:wght@500;800&display=swap');
        
        :root { --primary: #ff0000; --secondary: #00ff41; --bg: #000; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); overflow: hidden; font-family: 'JetBrains Mono', monospace; color: var(--secondary); }

        #matrix { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; opacity: 0.6; filter: blur(0.5px); }

        #terminal { position: relative; z-index: 10; height: 100vh; display: flex; flex-direction: column; padding: 30px; box-sizing: border-box; background: radial-gradient(circle, transparent 20%, #000 100%); }

        .header { border-bottom: 2px solid var(--primary); padding-bottom: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; font-family: 'Syncopate', sans-serif; font-size: 0.8rem; text-shadow: 0 0 15px var(--primary); color: #fff; }

        .glitch-wrap { text-align: center; margin-bottom: 30px; position: relative; }
        .main-title { font-size: 5rem; font-weight: 800; color: #fff; text-shadow: 3px 0 var(--primary), -3px 0 var(--secondary); animation: glitch-anim 0.2s infinite ease-in-out alternate; }

        @keyframes glitch-anim {
            0% { transform: skew(2deg); text-shadow: 3px 0 var(--primary); }
            100% { transform: skew(-2deg); text-shadow: -3px 0 var(--secondary); }
        }

        .output { flex: 1; overflow-y: auto; scrollbar-width: none; font-size: 1rem; }
        .output::-webkit-scrollbar { display: none; }

        .line { margin-bottom: 8px; line-height: 1.2; text-shadow: 0 0 5px var(--secondary); }
        .cmd-out { color: #fff; border-left: 3px solid var(--primary); padding-left: 15px; margin: 15px 0; background: rgba(255,0,0,0.1); }

        .input-area { display: flex; align-items: center; background: rgba(255,0,0,0.15); border: 1px solid var(--primary); padding: 15px; box-shadow: 0 0 20px var(--primary); }
        .prompt { margin-right: 15px; color: #fff; font-weight: 800; animation: blink 0.5s infinite; }
        @keyframes blink { 50% { opacity: 0.2; } }
        #cmd-input { background: none; border: none; color: var(--secondary); font-family: inherit; font-size: 1.3rem; width: 100%; outline: none; font-weight: bold; }
        
        .pulse { animation: pulse-red 0.1s; }
        @keyframes pulse-red { 0% { background: var(--primary); } 100% { background: transparent; } }
    </style>
</head>
<body onclick="initAudio()">
    <canvas id="matrix"></canvas>
    <div id="terminal">
        <div class="header">
            <div>[STATUS: GOD_MODE_ACTIVE]</div>
            <div id="clock">00:00:00</div>
        </div>
        
        <div class="output" id="out">
            <div class="glitch-wrap">
                <h1 class="main-title">BELO</h1>
            </div>
            <p class="line">> SYNCING NEURAL INTERFACE...</p>
            <p class="line">> ACCESS GRANTED: ROOT_USER_BELO</p>
        </div>

        <div class="input-area">
            <span class="prompt">#</span>
            <input type="text" id="cmd-input" autofocus autocomplete="off" placeholder="Enter Command...">
        </div>
    </div>

    <script>
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const text = "BELO "; 
        const fontSize = 22;
        const rows = Math.floor(canvas.height / fontSize);
        const xPositions = Array(rows).fill(0);

        function drawMatrix() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.1)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#ff0000"; 
            ctx.font = "900 " + fontSize + "px monospace";
            xPositions.forEach((x, i) => {
                const char = text.charAt(Math.floor(Math.random() * text.length));
                ctx.fillText(char, x * fontSize, i * fontSize);
                if (x * fontSize > canvas.width && Math.random() > 0.99) xPositions[i] = 0;
                xPositions[i]++;
            });
        }
        setInterval(drawMatrix, 25);

        let audioCtx;
        function initAudio() { if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
        function playSound(freq, type, dur) {
            if(!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + dur);
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0') + ":" + now.getSeconds().toString().padStart(2, '0');
        }
        setInterval(updateClock, 1000);

        const input = document.getElementById('cmd-input');
        const out = document.getElementById('out');
        const links = { 'instagram': "https://www.instagram.com/i_eminki.01", 'snapchat': "https://snapchat.com/t/FIuxhe8f", 'tiktok': "https://www.tiktok.com/@1st.belo" };

        input.addEventListener('keydown', (e) => {
            playSound(150, 'square', 0.05);
            if (e.key === 'Enter') {
                document.body.classList.add('pulse');
                setTimeout(() => document.body.classList.remove('pulse'), 100);
                playSound(400, 'sine', 0.1);
                
                const cmd = input.value.trim().toLowerCase();
                input.value = '';
                printLine(`<span style="color:#fff;"># ${cmd}</span>`);

                if (cmd === 'help') {
                    printLine("TITAN-X CMDS: annihilate, ghost, breach, bio, whoami, socials, clear");
                } else if (cmd === 'annihilate') {
                    printLine("TARGET ACQUIRED. DELETING TRACES...", "cmd-out");
                    setTimeout(() => printLine("WIPED. System clean."), 1000);
                } else if (cmd === 'bio') {
                    printLine("UNDERESTIMATE ME. THAT’LL BE FUN.", "cmd-out");
                } else if (cmd === 'whoami') {
                    printLine("NAME: MVP BELO", "cmd-out");
                    printLine("STATUS: SUPREME_OVERLORD");
                } else if (links[cmd]) {
                    printLine(`REDIRECTING TO ${cmd.toUpperCase()}...`);
                    setTimeout(() => window.open(links[cmd], '_blank'), 500);
                } else if (cmd === 'clear') {
                    out.innerHTML = '';
                } else {
                    printLine("SYSTEM_ERROR: UNKNOWN_OPERATOR", "cmd-out");
                }
                out.scrollTop = out.scrollHeight;
            }
        });

        function printLine(txt, cls = '') {
            const p = document.createElement('p'); p.className = 'line ' + cls;
            p.innerHTML = txt; out.appendChild(p);
        }
    </script>
</body>
</html>
