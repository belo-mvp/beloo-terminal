<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MVP-BELO | PRESTIGE SYSTEM</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap');
        
        :root { --neon: #00ff41; --glow: 0 0 20px rgba(0, 255, 65, 0.6); }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: 'Fira Code', monospace; color: var(--neon); }

        /* Prestige CRT Overlay */
        body::after { content: " "; position: absolute; top: 0; left: 0; bottom: 0; right: 0; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03)); z-index: 10; background-size: 100% 3px, 2px 100%; pointer-events: none; }

        #matrix-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; opacity: 0.3; }
        
        #terminal { position: relative; z-index: 5; height: 100vh; display: flex; flex-direction: column; padding: 50px 30px; box-sizing: border-box; background: radial-gradient(circle at center, rgba(0,30,0,0.2) 0%, #000 100%); }

        .status-bar { border-bottom: 2px solid var(--neon); padding-bottom: 10px; margin-bottom: 30px; display: flex; justify-content: space-between; font-weight: bold; letter-spacing: 2px; text-transform: uppercase; text-shadow: var(--glow); }

        .output { flex: 1; overflow-y: auto; scrollbar-width: none; }
        .output::-webkit-scrollbar { display: none; }

        .line { margin-bottom: 12px; font-size: 1.2rem; line-height: 1.4; filter: drop-shadow(0 0 5px var(--neon)); }
        .user-tag { color: #fff; font-weight: bold; background: rgba(0, 255, 65, 0.2); padding: 2px 8px; border-radius: 3px; }

        .box-special { border: 2px double var(--neon); padding: 25px; margin: 25px 0; font-size: 1.6rem; text-align: center; background: rgba(0, 255, 65, 0.05); box-shadow: inset 0 0 20px rgba(0, 255, 65, 0.2), 0 0 20px rgba(0, 255, 65, 0.2); color: #fff; font-weight: 700; text-transform: uppercase; animation: glitch-border 0.5s infinite linear; }

        .input-wrap { display: flex; align-items: center; padding-top: 30px; }
        #input-command { background: none; border: none; color: #fff; font-family: inherit; font-size: 1.3rem; width: 100%; outline: none; caret-color: var(--neon); margin-left: 15px; }

        @keyframes glitch-border { 0% { border-color: var(--neon); } 50% { border-color: #fff; } 100% { border-color: var(--neon); } }
    </style>
</head>
<body>
    <canvas id="matrix-canvas"></canvas>
    <div id="terminal">
        <div class="status-bar">
            <span>Core: MVP_BELO_V6</span>
            <span id="clock">00:00:00</span>
        </div>
        
        <div class="output" id="terminal-output">
            <p class="line">>> SECURE LINE ESTABLISHED...</p>
            <p class="line">>> BYPASSING FIREWALL... [SUCCESS]</p>
            <p class="line">>> WELCOME BACK, <span style="color:#fff;">ADMIN</span>.</p>
        </div>

        <div class="input-wrap">
            <span class="user-tag">mvp-belo@mainframe:~#</span>
            <input type="text" id="input-command" autofocus autocomplete="off">
        </div>
    </div>

    <script>
        // Clock Function
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0') + ":" + now.getSeconds().toString().padStart(2, '0');
        }
        setInterval(updateClock, 1000);

        // Matrix Background - Only MVP BELO
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const matrixName = "MVP BELO ";
        const fontSize = 20;
        const drops = Array(Math.floor(canvas.width / fontSize)).fill(1);

        function draw() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#0f0'; 
            ctx.font = 'bold ' + fontSize + 'px monospace';
            drops.forEach((y, i) => {
                const text = matrixName.charAt(Math.floor(Math.random() * matrixName.length));
                ctx.fillText(text, i * fontSize, y * fontSize);
                if (y * fontSize > canvas.height && Math.random() > 0.985) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(draw, 45);

        // Terminal Logic
        const input = document.getElementById('input-command');
        const output = document.getElementById('terminal-output');
        const links = { 'instagram': "https://www.instagram.com/i_eminki.01", 'snapchat': "https://snapchat.com/t/FIuxhe8f", 'tiktok': "https://www.tiktok.com/@1st.belo" };

        document.addEventListener('click', () => input.focus());

        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const cmd = input.value.trim().toLowerCase();
                input.value = '';
                if (!cmd) return;

                print(`<span class="user-tag">mvp-belo@mainframe:~#</span> ${cmd}`);

                if (cmd === 'help') {
                    print("> SYSTEM OVERRIDE: help, instagram, snapchat, tiktok, underestimate, clear");
                } else if (links[cmd]) {
                    print(`> TUNNELING CONNECTION TO ${cmd.toUpperCase()} PROTOCOL...`);
                    setTimeout(() => window.open(links[cmd], '_blank'), 600);
                } else if (cmd === 'underestimate') {
                    print("Underestimate me. That'll be fun.", "box-special");
                } else if (cmd === 'clear') {
                    output.innerHTML = '';
                } else {
                    print(`> ERR: UNKNOWN COMMAND [${cmd}]`);
                }
                output.scrollTop = output.scrollHeight;
            }
        });

        function print(text, cls = '') {
            const d = document.createElement('div'); d.className = 'line ' + cls;
            d.innerHTML = text; output.appendChild(d);
        }
    </script>
</body>
</html>
