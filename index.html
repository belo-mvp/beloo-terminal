<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BELOO MVP TERMINAL</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #000; overflow: hidden; display: flex; flex-direction: column; font-family: monospace; color: #0f0; }
        #matrix-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 10; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #start-btn { padding: 20px 40px; border: 3px solid #0f0; color: #0f0; background: none; font-family: monospace; font-size: 1.5rem; cursor: pointer; box-shadow: 0 0 20px #0f0; margin-top: 20px; }
        #terminal { position: relative; z-index: 2; flex: 1; padding: 20px; font-size: 1.2rem; text-shadow: 0 0 5px #0f0; display: none; flex-direction: column; justify-content: flex-end; }
        .output { overflow-y: auto; max-height: 80%; }
        .line { margin: 0; padding: 5px 0; }
        .line.system { color: #ff0000; text-align: center; font-weight: bold; font-size: 1.5rem; }
        .prompt-container { display: flex; align-items: center; }
        #input-command { background: none; border: none; color: #0f0; font-family: monospace; font-size: 1.2rem; width: 100%; outline: none; }
        .welcome-msg { color: #0f0; font-size: 2rem; text-align: center; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div id="overlay">
        <div class="welcome-msg">MVP BELOO</div>
        <button id="start-btn">START SYSTEM</button>
    </div>
    <canvas id="matrix-canvas"></canvas>
    <div id="terminal">
        <div class="output" id="terminal-output">
            <p class="line system">WELCOME TO THE MVP_BELOO TERMINAL [ONLINE]</p>
        </div>
        <div class="prompt-container">
            <span style="color:#88ff88; margin-right:5px;">[mvp_beloo@terminal ~]$</span>
            <input type="text" id="input-command" autocomplete="off">
        </div>
    </div>
    <script>
        const typingSound = new Audio('https://www.soundjay.com/communication/typewriter-key-1.mp3');
        const accessSound = new Audio('https://www.soundjay.com/buttons/button-09.mp3');
        
        document.getElementById('start-btn').addEventListener('click', function() {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('terminal').style.display = 'flex';
            document.getElementById('input-command').focus();
            // Unlock audio for iOS
            typingSound.play().then(() => { typingSound.pause(); typingSound.currentTime = 0; });
            accessSound.play().then(() => { accessSound.pause(); accessSound.currentTime = 0; });
        });

        // Matrix background with "MVP BELOO"
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const textToDrop = "MVP BELOO 1010 ";
        const fontSize = 16;
        const drops = Array(Math.floor(canvas.width/fontSize)).fill(1);
        function draw() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#0f0'; ctx.font = fontSize + 'px monospace';
            drops.forEach((y, i) => {
                const char = textToDrop[Math.floor(Math.random() * textToDrop.length)];
                ctx.fillText(char, i * fontSize, y * fontSize);
                if (y * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(draw, 35);

        const inputField = document.getElementById('input-command');
        inputField.addEventListener('keydown', (e) => {
            typingSound.currentTime = 0;
            typingSound.play();
            if (e.key === 'Enter') {
                const cmd = inputField.value.toLowerCase();
                inputField.value = '';
                const p = document.createElement('p'); p.innerText = `[mvp_beloo@terminal ~]$ ${cmd}`;
                document.getElementById('terminal-output').appendChild(p);
                if(cmd === 'underestimate') accessSound.play();
            }
        });
    </script>
</body>
</html>
